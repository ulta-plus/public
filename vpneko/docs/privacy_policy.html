<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy — VPNeko</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    line-height: 1.6;
    color: #1a1a1a;
  }
  h1 { font-size: 28px; margin-bottom: 4px; }
  .updated { color: #666; font-size: 14px; margin-bottom: 32px; }
  h2 { font-size: 20px; margin-top: 32px; }
  a { color: #2563eb; }

  /* Preserves line breaks and spacing exactly as pasted below,
     without needing to wrap paragraphs in <p> tags manually. */
  .content {
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <h1>Privacy Policy</h1>
  <p class="updated">VPNeko · Effective date: July 1, 2026</p>

  <!--
    Paste the privacy policy text below, inside the .content div, as plain text.
    Line breaks and blank lines will render exactly as typed thanks to
    "white-space: pre-wrap" above — no need to add <p> or <br> tags.
  -->
  <div class="content">[Paste VPNeko privacy policy text here]</div>

</body>
</html>
